<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>New Car</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="car-card">
        <h1>Insert New Car</h1>
        <form action="/add-car" method="POST">
            <input type="text" name="brand" placeholder="brand" required><br><br>
            <input type="text" name="model" placeholder="model" required><br><br>
            <input type="number" name="year" placeholder="year" required><br><br>
            <input type="text" name="color" placeholder="color" required><br><br>
            <button type="submit" class="btn">Add Car</button>
        </form>
        <br>
        <a href="/">Back To Your Cars </a>
    </div>
</body>
</html>
