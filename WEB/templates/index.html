<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Car</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="cars-container">
        
        {% for car in cars %}
            <div class="car-card">
                <h1>car's parameter!</h1>
                <ul class="car-details">
                    <li><span class="label">brand:</span> {{ car.brand }}</li>
                    <li><span class="label">model:</span> {{ car.model }}</li>
                    <li><span class="label">year:</span> {{ car.year }}</li>
                    <li><span class="label">color:</span> {{ car.color }}</li>
                </ul>
            </div>
        {% else %}
            <div class="no-cars">
                <p>No Cars Yet...</p>
            </div>
        {% endfor %}

    </div>

    <div class="actions-container">
        <a href="/add-car">
            <button class="btn">Add New Car</button>
        </a>
    </div>

</body>
</html>
