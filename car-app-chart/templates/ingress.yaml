apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "car-app.fullname" . }}-ingress
  labels: {{- include "car-app.labels" . | nindent 4 }}
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "sticky-cookie"
spec:
  ingressClassName: traefik
  rules:
  - host: car-app.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "car-app.fullname" . }}-svc
            port:
              number: 80