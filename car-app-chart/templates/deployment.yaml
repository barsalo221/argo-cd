apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "car-app.fullname" . }}
  labels: {{- include "car-app.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.app.revisionHistoryLimit }}
  replicas: {{ .Values.app.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # לעולם לא להוריד פוד לפני שהחדש מוכן
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "car-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: car-backend
  template:
    metadata:
      labels:
        {{- include "car-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: car-backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "cars-app-role"
        vault.hashicorp.com/agent-inject-secret-mongo-credentials: "database/creds/cars-app-role"
        vault.hashicorp.com/agent-inject-template-mongo-credentials: |
          {{ `{{ with secret "database/creds/cars-app-role" }}` }}
          mongodb://{{ `{{ .Data.username }}` }}:{{ `{{ .Data.password }}` }}@{{ include "car-app.fullname" . }}-mongo-svc.default.svc.cluster.local:27017/my_cars?authSource=my_cars&directConnection=true&tls=false
          {{ `{{ end }}` }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: car-container
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.image.containerPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.app.image.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.app.image.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                # נותן ל-Traefik זמן להוציא את הפוד מהרוטציה לפני סגירה
                command: ["/bin/sh", "-c", "sleep 10"]
          env:
            - name: MONGO_URI_FILE
              value: "/vault/secrets/mongo-credentials"