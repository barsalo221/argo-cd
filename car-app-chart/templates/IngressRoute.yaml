apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "car-app.fullname" . }}-route
  namespace: default
  labels: {{- include "car-app.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`car-app.local`)
      kind: Rule
      services:
        - name: {{ include "car-app.fullname" . }}-svc
          port: {{ .Values.service.port }}
          sticky:
            cookie:
              name: car_sticky
              httpOnly: true
              secure: false
              sameSite: lax